version = 1

# Template for dynamically generated llama.cpp router presets.
#
# bin/run.sh uses this file when LLAMA_MODELS_PRESET is unset. It copies the
# shared defaults below, discovers GGUF files under MODELS_DIR, and appends one
# preset section per discovered model. The generated active preset is temporary;
# the mounted model directory is not modified.

[*]
threads = 12
flash-attn = on
mlock = off
mmap = off
fit = off
warmup = off
ctx-size = 262144
# Long-context RoPE/YaRN experiments. Leave disabled by default so models use
# their GGUF metadata unless explicitly testing extended-context scaling.
# rope-scaling = yarn
# rope-scale = 8
# yarn-orig-ctx = 32768
# bin/run.sh overrides batch-size and ubatch-size for backend-specific runs:
# Vulkan stays conservative; ROCm/ROCm-next use larger prefill microbatches.
# These values remain a safe fallback for raw llama-server invocations.
batch-size = 2048
ubatch-size = 1024
n-gpu-layers = 999
# Main-model KV cache datatypes. llama.cpp accepts f32, f16, bf16, q8_0,
# q4_0, q4_1, iq4_nl, q5_0, and q5_1. f16 is upstream default; q8_0 is the
# conservative quantized choice for long-context Strix Halo agent runs.
cache-type-k = q8_0
cache-type-v = q8_0
kv-offload = on
kv-unified = on
jinja = true
reasoning = on
image-min-tokens = 1024
direct-io = on
sleep-idle-seconds = 1800
parallel = 4
# Context checkpoints are restore points for prompt/cache reuse on SWA/hybrid
# models. The current llama.cpp image rejects the older
# checkpoint-every-n-tokens flag; checkpoint-min-step is the supported spacing
# floor. With 4 agent slots and ~108 GiB usable unified memory, keep enough
# checkpoints to avoid full prompt re-processing after branch/follow-up turns.
ctx-checkpoints = 32
checkpoint-min-step = 256
cache-prompt = true
cache-reuse = 256
cache-ram = 32768

# Qwen3.6 coding/agent baseline.
temp = 0.6
top-p = 0.95
top-k = 20
min-p = 0.0
presence-penalty = 0.0
repeat-penalty = 1.0

# Dynamic generation rules:
# - Discover every non-mmproj *.gguf under MODELS_DIR.
# - Name sections as author/repo:quant when the path has that shape.
# - Generate plain model sections without mmproj by default.
# - With --with-vision, add :vision sections when exactly one same-directory
#   mmproj*.gguf is present.
# - Add MTP speculation settings when the path or filename contains MTP/mtp.
# - With --with-non-reasoning, add :non-reasoning variants for
#   Qwen/Qwen-derived models only.

# Qwen non-reasoning generated override:
# reasoning = off
# temp = 0.7
# top-p = 0.8
# presence-penalty = 1.5

# MTP generated override:
# spec-type = draft-mtp,ngram-map-k4v
# spec-draft-n-max = 3
# Draft/MTP KV cache datatypes use the same allowed values as cache-type-k/v.
# Keeping them at q8_0 matches the main cache while avoiding f16 draft KV growth.
# spec-draft-type-k = q8_0
# spec-draft-type-v = q8_0
# spec-ngram-map-k4v-size-n = 16
# spec-ngram-map-k4v-size-m = 24
# spec-ngram-map-k4v-min-hits = 2

# --- GENERATED MODEL SECTIONS ---
